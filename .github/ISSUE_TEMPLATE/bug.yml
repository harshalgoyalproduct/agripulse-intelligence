name: Bug Report
description: Report a bug or unexpected behavior in AgriPulse Intelligence
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much detail as possible to help us fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clearly describe the bug and what you expected to happen
      placeholder: |
        Example: When I select a district from the sidebar, the dashboard shows data for
        a different district instead.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the bug
      placeholder: |
        1. Go to the dashboard
        2. Click on "Akola District" in the left sidebar
        3. Observe the displayed data

        Expected: Data for Akola District is shown
        Actual: Data for Amravati District is shown
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: The dashboard should display accurate data for the selected district
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What is actually happening?
      placeholder: The dashboard displays data for a different district
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this bug impact functionality?
      options:
        - Critical (feature is completely broken)
        - High (major functionality impaired)
        - Medium (features work but with issues)
        - Low (minor UI/UX issue)
    validations:
      required: true

  - type: dropdown
    id: affected_component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      options:
        - Frontend Dashboard
        - Backend API
        - Data Ingestion Pipeline
        - Satellite Data Integration
        - Weather Data Integration
        - Mandi Price Integration
        - Authentication/Authorization
        - Database
        - DevOps/Deployment
        - Other

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Provide information about your environment
      placeholder: |
        - OS: macOS 13.4
        - Browser: Chrome 114
        - Backend Version: 0.1.0
        - Frontend Version: 0.1.0
        - Deployment: Local (docker-compose)
    validations:
      required: false

  - type: textarea
    id: error_logs
    attributes:
      label: Error Logs / Stack Trace
      description: Include any error messages, stack traces, or log output
      placeholder: |
        ```
        [2026-04-16 10:23:45] ERROR: Failed to fetch NDVI data for district_id=1
        Traceback (most recent call last):
          File "app/services/satellite.py", line 45, in fetch_ndvi
            response = requests.get(url, timeout=30)
        ...
        ```
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Video
      description: Attach screenshots or video demonstrating the bug
      placeholder: You can paste images here

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful
      placeholder: |
        - This started happening after the recent data refresh
        - Only affects certain districts
        - Doesn't happen in staging environment

  - type: checkboxes
    id: checklist
    attributes:
      label: Verification
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using the latest version of AgriPulse
          required: false
        - label: The bug is reproducible on my end
          required: true
        - label: This is not a feature request in disguise
          required: true
